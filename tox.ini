[tox]
envlist =
    py{310,311,312,313,314}-{test}-{dev}{,pyqt64,pyside64,pyqt69,pyside69,jupyter,visual,visualqt,visualjupyter}
    codestyle
requires = pip >= 18.0
           setuptools >= 30.3.0

[testenv]
passenv =
    DISPLAY
    HOME
changedir =
    test: .tmp/{envname}
setenv =
    visual,visualqt,visualjupyter: MPLFLAGS = --mpl -m "mpl_image_compare" --mpl-generate-summary=html --mpl-results-path={toxinidir}/results --mpl-hash-library={toxinidir}/glue_vispy_viewers/tests/images/{envname}.json --mpl-baseline-path=https://raw.githubusercontent.com/glue-viz/glue-vispy-viewers-visual-tests/main/images/{envname}/
deps =
    pyqt64: PyQt6==6.4.*
    pyside64: PySide6==6.4.*
    pyqt65: PyQt6==6.5.*
    pyside65: PySide6==6.5.*
    pyqt66: PyQt6==6.6.*
    pyside66: PySide6==6.6.*
    pyqt67: PyQt6==6.7.*
    pyside67: PySide6==6.7.*
    pyqt68: PyQt6==6.8.*
    pyside68: PySide6==6.8.*
    pyqt69: PyQt6==6.9.*
    pyside69: PySide6==6.9.*
    dev: glue-core @ git+https://github.com/glue-viz/glue
    dev: glue-qt @ git+https://github.com/glue-viz/glue-qt
    dev: vispy @ git+https://github.com/vispy/vispy
    oldestdeps: glue-core==1.13.*
    oldestdeps: echo==0.6
    oldestdeps: vispy==0.14.*
extras =
    test: test
    pyqt64,pyqt65,pyqt66,pyqt67,pyqt68,pyqt69: pyqt
    pyside64,pyside65,pyside66,pyside67,pyside68,pyside69: pyside
    jupyter: jupyter
    visual: visualtest
    visualqt: visualtest-qt
    visualjupyter: visualtest-jupyter
commands =
    test: pip freeze
    test-!visual-!visualqt-!visualjupyter: pytest --pyargs glue_vispy_viewers --cov glue_vispy_viewers {posargs}
    # Each visual env runs only its own visual test modules so that
    # test-collection imports don't cross-contaminate (in particular, importing
    # the backend-independent helpers locks the vispy backend to glfw, which
    # would break the Jupyter canary that needs jupyter_rfb).
    test-visual: pytest --pyargs glue_vispy_viewers.scatter.tests.test_visual glue_vispy_viewers.volume.tests.test_visual {env:MPLFLAGS} {posargs}
    test-visualqt: pytest --pyargs glue_vispy_viewers.scatter.qt.tests.test_visual glue_vispy_viewers.volume.qt.tests.test_visual {env:MPLFLAGS} {posargs}
    visualjupyter: playwright install chromium
    # Only the volume Jupyter canary runs -- it has been deterministic on
    # CI while the scatter render exhibited timing-dependent variance.
    # One canary is enough to verify the JupyterVispyVolumeViewer +
    # jupyter_rfb + solara + playwright pipeline; the per-feature
    # coverage is in the backend-independent tests.
    test-visualjupyter: pytest --pyargs glue_vispy_viewers.volume.jupyter.tests.test_visual {env:MPLFLAGS} {posargs}

[testenv:codestyle]
deps = flake8
skip_install = true
commands =
    flake8 --max-line-length=100 glue_vispy_viewers
