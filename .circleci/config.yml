version: 2.1

jobs:

  # The following job is to run any visual comparison test, and runs on any branch
  # or in any pull request. It will generate a summary page for each tox environment
  # being run which is accessible through the CircleCI artifacts.

  visual:
    parameters:
      jobname:
        type: string
    docker:
      - image: cimg/python:3.11
    environment:
      TOXENV: << parameters.jobname >>
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            sudo apt update
            sudo apt install -y xvfb libxcb-cursor0 libxkbcommon-x11-0 libegl1 libglx-mesa0 \
                libatk1.0-0 libatk-bridge2.0-0 libcups2 libatspi2.0-0 libxdamage1 libgbm1 \
                libpango-1.0-0 libcairo2 libasound2
            pip install pip tox --upgrade
      - run:
          name: Run tests
          command: |
            Xvfb :99 -screen 0 1024x768x24 > /tmp/xvfb.log 2>&1 &
            export DISPLAY=:99
            sleep 1
            tox -v
      - store_artifacts:
          path: results
      - run:
          name: "Image comparison page is available at: "
          command: echo "${CIRCLE_BUILD_URL}/artifacts/${CIRCLE_NODE_INDEX}/results/fig_comparison.html"

  # The following job runs only on main - and its main purpose is to update the
  # reference images in the glue-vispy-viewers-visual-tests repository. This job
  # needs a deploy key. To produce this, go to the glue-vispy-viewers-visual-tests
  # repository settings and go to SSH keys, then add your public SSH key.
  deploy-reference-images:
    parameters:
      jobname:
        type: string
    docker:
      - image: cimg/python:3.11
    environment:
      TOXENV: << parameters.jobname >>
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            sudo apt update
            sudo apt install -y xvfb libxcb-cursor0 libxkbcommon-x11-0 libegl1 libglx-mesa0 \
                libatk1.0-0 libatk-bridge2.0-0 libcups2 libatspi2.0-0 libxdamage1 libgbm1 \
                libpango-1.0-0 libcairo2 libasound2
            pip install pip tox --upgrade
      - run: ssh-add -D
      - add_ssh_keys:
          fingerprints: "CHANGE_ME_AFTER_ADDING_DEPLOY_KEY"
      - run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run: git config --global user.email "glue@circleci" && git config --global user.name "Glue Circle CI"
      - run: git clone git@github.com:glue-viz/glue-vispy-viewers-visual-tests.git --depth 1 ~/glue-vispy-viewers-visual-tests/
      - run:
          name: Generate reference images
          command: |
            Xvfb :99 -screen 0 1024x768x24 > /tmp/xvfb.log 2>&1 &
            export DISPLAY=:99
            sleep 1
            tox -v -- --mpl-generate-path=/home/circleci/glue-vispy-viewers-visual-tests/images/$TOXENV
      - run: |
          cd ~/glue-vispy-viewers-visual-tests/
          git pull
          git status
          git add .
          git commit -m "Update reference images from ${CIRCLE_BRANCH}" || echo "No changes to reference images to deploy"
          git push

workflows:
  version: 2

  visual-tests:
    jobs:
      # Backend-independent tests run first; the Qt and Jupyter canary jobs
      # only run if this one passes. There is no point burning CI minutes on
      # a Qt-binding regression when the underlying rendering itself is
      # broken.
      - visual:
          name: py311-test-visual
          jobname: py311-test-visual

      - visual:
          name: py311-test-visualqt
          jobname: py311-test-visualqt
          requires:
            - py311-test-visual

      - visual:
          name: py311-test-visualjup
          jobname: py311-test-visualjup
          requires:
            - py311-test-visual

      - deploy-reference-images:
          name: baseline-py311-test-visual
          jobname: py311-test-visual
          requires:
            - py311-test-visual
          filters:
            branches:
              only:
                - main

      - deploy-reference-images:
          name: baseline-py311-test-visualqt
          jobname: py311-test-visualqt
          requires:
            - py311-test-visualqt
          filters:
            branches:
              only:
                - main

      - deploy-reference-images:
          name: baseline-py311-test-visualjup
          jobname: py311-test-visualjup
          requires:
            - py311-test-visualjup
          filters:
            branches:
              only:
                - main
